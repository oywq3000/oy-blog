server:
  port: 8091

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.200.130:3306/oyblog?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&allowMultiQueries=true
    username: root
    password: root
  data:
    redis:
      host: 192.168.200.130
      timeout: 10000
      client-type: lettuce
      lettuce:
        pool:
          max-active: 8 # 最大连接数
          max-wait: -1 # 最大阻塞等待时间（负数表示无限制）
          max-idle: 8 # 最大空闲连接数
          min-idle: 0 # 最小空闲连接数
  cloud:
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: 192.168.200.130:8858
        port: 8719
      filter:
        url-patterns: /**
  rabbitmq:
    host: 192.168.200.130
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    # 开启消息确认
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true


# ============ Logging Configuration ============
logging:
  level:
    com.oyproj: DEBUG
    org.springframework: WARN
  file:
    path: ./logs

feign:
  sentinel:
    enabled: true
