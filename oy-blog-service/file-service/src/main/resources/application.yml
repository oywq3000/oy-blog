server:
  port: 8092

spring:
  data:
    redis:
      host: 192.168.200.130
      timeout: 10000
      client-type: lettuce
      lettuce:
        pool:
          max-active: 8 # 最大连接数
          max-wait: -1 # 最大阻塞等待时间（负数表示无限制）
          max-idle: 8 # 最大空闲连接数
          min-idle: 0 # 最小空闲连接数
  cloud:
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: 192.168.200.130:8858
        port: 8719
      filter:
        url-patterns: /**
# ============ Logging Configuration ============
logging:
  level:
    com.oyproj: DEBUG
    org.springframework: WARN
  file:
    path: ./logs/file-service

feign:
  sentinel:
    enabled: true



storage:
  minio-endpoint: http://192.168.200.130:9090
  minio-access-key: minioadmin
  minio-secret-key: minioadmin
  minio-bucket: oy-blog
  storage-platform: 1
