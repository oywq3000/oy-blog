server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1
        - id: article-service
          uri: lb://article-service
          predicates:
            - Path=/article-service/**
          filters:
            - StripPrefix=1
        - id: file-service
          uri: lb://file-service
          predicates:
            - Path=/file-service/**
          filters:
            - StripPrefix=1
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/search-service/**
          filters:
            - StripPrefix=1
  data:
    redis:
      host: 192.168.200.130
      timeout: 10000
      client-type: lettuce
      lettuce:
        pool:
          max-active: 8 # 最大连接数
          max-wait: -1 # 最大阻塞等待时间（负数表示无限制）
          max-idle: 8 # 最大空闲连接数
          min-idle: 0 # 最小空闲连接数

auth:
  whitelist:
    - /user-service/auth/login
    - /user-service/auth/register
    - /user-service/profile/info
    - /article-service/article/read
    - /health
    - /swagger-ui
    - /v3/api-docs



